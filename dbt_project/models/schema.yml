version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: country
        tests:
          - not_null

      - name: segment
        tests:
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

      - name: status
        tests:
          - accepted_values:
              values: ['pending', 'shipped', 'cancelled']

  - name: mart_orders_by_country
    columns:
      - name: country
        tests:
          - not_null

      - name: total_orders
        tests:
          - not_null